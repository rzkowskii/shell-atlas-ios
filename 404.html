<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://shellatlas.app/">
  <title>Shell Atlas - Not Found</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b10;
      --panel: #101721;
      --text: #f1f6f8;
      --muted: #a3adb7;
      --cyan: #5be3d4;
      --gold: #f2b92c;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 22% 18%, rgba(91, 227, 212, 0.15), transparent 24rem),
        radial-gradient(circle at 78% 12%, rgba(242, 185, 44, 0.12), transparent 22rem),
        #070b10;
    }

    main {
      width: min(720px, 100%);
      border: 1px solid rgba(91, 227, 212, 0.32);
      border-radius: 8px;
      background: rgba(16, 23, 33, 0.88);
      padding: clamp(24px, 6vw, 52px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
    }

    p:first-child {
      margin: 0 0 12px;
      color: var(--gold);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 2.8rem, 2.8rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      margin-top: 10px;
      padding: 0 18px;
      border-radius: 8px;
      background: var(--cyan);
      color: #04110f;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <p>404</p>
    <h1>This public repo does not publish the Shell Atlas source tree.</h1>
    <p>The requested path is not part of the promotional stub. Shell Atlas source code, build files, internal docs, private configs, and release workflows are intentionally not available here.</p>
    <a href="https://shellatlas.app/">Visit official site</a>
  </main>
</body>
</html>
